version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beatclaude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beatclaude}
      POSTGRES_DB: ${POSTGRES_DB:-beatclaude}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beatclaude"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-beatclaude}:${POSTGRES_PASSWORD:-beatclaude}@db:5432/${POSTGRES_DB:-beatclaude}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-beatclaude}:${POSTGRES_PASSWORD:-beatclaude}@db:5432/${POSTGRES_DB:-beatclaude}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend

volumes:
  pgdata:
